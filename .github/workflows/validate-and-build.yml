name: Validate and Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate_build:
    name: Validate and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate archive routes
        run: npm run validate:routes && echo "Archive route validation passed"

      - name: Validate reader room
        run: npm run reader-room:validate && echo "Reader room validation passed"

      - name: Build succeeded
        run: npm run build && echo "Build succeeded"

  production_verification:
    name: Production verification
    needs: validate_build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify production routes
        run: npm run verify:production -- https://wdblackwoods-site.vercel.app && echo "Production verification passed"
